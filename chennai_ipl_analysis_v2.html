<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chennai IPL — Response Analysis</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #f9a825;
    --accent2: #1da1f2;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --positive: #4caf50;
    --negative: #f44336;
    --neutral: #78909c;
    --mixed: #ff9800;
    --complaint: #ef5350;
    --question: #42a5f5;
    --praise: #66bb6a;
    --support: #26c6da;
    --spam: #bdbdbd;
    --troll: #e040fb;
    --sarcasm: #ffca28;
    --success: #aed581;
    --high-value: #4caf50;
    --low-effort: #607d8b;
    --bot-like: #f44336;
    --influencer: #ff9800;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }

  /* ── Layout ── */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 28px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
  .header .meta { color: var(--muted); font-size: 12px; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

  /* ── Summary cards ── */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── Distribution bars ── */
  .dist-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 12px; }
  .dist-label { width: 90px; text-align: right; color: var(--muted); white-space: nowrap; }
  .dist-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
  .dist-bar { height: 100%; border-radius: 4px; transition: width .4s ease; }
  .dist-count { width: 30px; color: var(--muted); }

  /* ── Filters ── */
  .filters { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .filters label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-right: 4px; }
  .filters select, .filters input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none; }
  .filters select:focus, .filters input:focus { border-color: var(--accent2); }
  .filter-count { margin-left: auto; font-size: 12px; color: var(--muted); }
  .toggle-replies { background: var(--accent2); border: none; color: #fff; border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .toggle-replies:hover { opacity: .85; }

  /* ── Cards ── */
  #cards-container { display: flex; flex-direction: column; gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color .2s; }
  .card:hover { border-color: var(--accent2); }
  .card-header { padding: 14px 18px 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; cursor: pointer; }
  .author { font-weight: 600; color: var(--accent2); font-size: 13px; }
  .author a { color: inherit; text-decoration: none; }
  .author a:hover { text-decoration: underline; }
  .ts { font-size: 11px; color: var(--muted); }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; white-space: nowrap; }

  /* sentiment badges */
  .badge-positive { background: #1b3c1e; color: var(--positive); }
  .badge-negative { background: #3c1b1b; color: var(--negative); }
  .badge-neutral  { background: #1e2430; color: var(--neutral); }
  .badge-mixed    { background: #3c2a10; color: var(--mixed); }

  /* intent badges */
  .badge-complaint  { background: #3c1b1b; color: #ef9a9a; }
  .badge-question   { background: #0d2a3c; color: #90caf9; }
  .badge-praise     { background: #1b3c1e; color: #a5d6a7; }
  .badge-support    { background: #0d2f33; color: #80deea; }
  .badge-spam       { background: #2a2a2a; color: #bdbdbd; }
  .badge-troll      { background: #2a1033; color: #ce93d8; }
  .badge-sarcasm    { background: #3c2f10; color: var(--sarcasm); }
  .badge-success    { background: #1e2e12; color: #c5e1a5; }
  .badge-neutral-intent { background: #1e2430; color: var(--neutral); }

  /* engagement badges */
  .badge-high_value  { background: #1b3c1e; color: #a5d6a7; }
  .badge-low_effort  { background: #1e2430; color: #78909c; }
  .badge-bot_like    { background: #3c1b1b; color: #ef9a9a; }
  .badge-influencer  { background: #3c2a10; color: #ffcc80; }

  .conf { font-size: 10px; opacity: .65; }

  .card-text { padding: 0 18px 14px; color: var(--text); font-size: 13px; white-space: pre-wrap; word-break: break-word; }

  /* ── Reply section ── */
  .reply-section { background: var(--surface2); border-top: 1px solid var(--border); padding: 14px 18px; }
  .reply-section .reply-header { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .tone-tag { background: #1e2a40; color: var(--accent2); border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 600; }
  .reply-option { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
  .reply-option:last-child { margin-bottom: 0; }
  .reply-option .opt-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
  .reply-option .opt-text { font-size: 13px; color: #d0e8ff; line-height: 1.55; margin-bottom: 6px; }
  .reply-option .opt-rationale { font-size: 11px; color: var(--muted); font-style: italic; }
  .copy-btn { float: right; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; padding: 2px 8px; font-size: 10px; cursor: pointer; transition: all .15s; }
  .copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .copy-btn.copied { border-color: var(--positive); color: var(--positive); }
  .no-reply { font-size: 12px; color: var(--muted); font-style: italic; }

  /* ── Collapsible ── */
  .card-body { display: none; }
  .card-body.open { display: block; }
  .chevron { margin-left: auto; color: var(--muted); font-size: 16px; transition: transform .2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }

  /* ── Distribution section ── */
  .dist-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 28px; }
  .dist-block { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .dist-block h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 14px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .container { padding: 16px 12px; }
    .filters { gap: 8px; }
  }
</style>
</head>

<div class="header">
  <div>
    <div class="header h1">🏏 Chennai IPL — Response Analysis</div>
    <div class="meta" id="report-meta">Loading…</div>
  </div>
</div>

<div class="container">
  <div class="summary-grid" id="summary-grid"></div>
  <div class="dist-section" id="dist-section"></div>

  <div class="filters">
    <div>
      <label>Sentiment</label>
      <select id="f-sentiment">
        <option value="">All</option>
        <option>positive</option><option>negative</option><option>neutral</option><option>mixed</option>
      </select>
    </div>
    <div>
      <label>Intent</label>
      <select id="f-intent">
        <option value="">All</option>
        <option>complaint</option><option>question</option><option>praise</option><option>support</option>
        <option>spam</option><option>troll</option><option>sarcasm</option><option>success</option><option>neutral</option>
      </select>
    </div>
    <div>
      <label>Engagement</label>
      <select id="f-engagement">
        <option value="">All</option>
        <option>high_value</option><option>low_effort</option><option>bot_like</option><option>influencer</option>
      </select>
    </div>
    <div>
      <label>Replies</label>
      <select id="f-replies">
        <option value="">All</option>
        <option value="yes">Has reply</option>
        <option value="no">No reply</option>
      </select>
    </div>
    <div>
      <label>Search</label>
      <input type="text" id="f-search" placeholder="keyword or @username…" style="width:200px">
    </div>
    <button class="toggle-replies" id="toggle-replies-btn">Collapse all replies</button>
    <span class="filter-count" id="filter-count"></span>
  </div>

  <div id="cards-container"></div>
</div>

<script>
// ── Embedded data ──────────────────────────────────────────────────────────
const DATA_FILE = 'report_chennaiipl_live_fixed.csv';

// Parse CSV (handles quoted fields with newlines)
function parseCSV(text) {
  const lines = [];
  let cur = '', inQ = false, fields = [], headers = null;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { fields.push(cur); cur = ''; }
      else if (c === '\n') {
        fields.push(cur); cur = '';
        if (!headers) headers = fields;
        else {
          const row = {};
          headers.forEach((h, idx) => row[h.trim()] = (fields[idx] || '').trim());
          lines.push(row);
        }
        fields = [];
      } else cur += c;
    }
  }
  // last line without trailing newline
  if (cur || fields.length) {
    fields.push(cur);
    if (headers) {
      const row = {};
      headers.forEach((h, idx) => row[h.trim()] = (fields[idx] || '').trim());
      if (Object.values(row).some(v => v)) lines.push(row);
    }
  }
  return lines;
}

function fmt(ts) {
  try { return new Date(ts).toLocaleString('en-IN', {dateStyle:'medium', timeStyle:'short'}); }
  catch { return ts; }
}

function badgeClass(type, val) {
  if (type === 'sentiment') return `badge-${val}`;
  if (type === 'intent') return val === 'neutral' ? 'badge-neutral-intent' : `badge-${val}`;
  if (type === 'engagement') return `badge-${val}`;
  return '';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function distColor(label) {
  const m = {
    positive:'#4caf50', negative:'#f44336', neutral:'#78909c', mixed:'#ff9800',
    complaint:'#ef5350', question:'#42a5f5', praise:'#66bb6a', support:'#26c6da',
    spam:'#9e9e9e', troll:'#e040fb', sarcasm:'#ffca28', success:'#aed581',
    high_value:'#4caf50', low_effort:'#607d8b', bot_like:'#f44336', influencer:'#ff9800',
    neutral_intent:'#78909c',
  };
  return m[label] || '#607d8b';
}

function buildDist(rows, key, title) {
  const counts = {};
  rows.forEach(r => { const v = r[key] || 'unknown'; counts[v] = (counts[v]||0)+1; });
  const total = rows.length;
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const bars = sorted.map(([label, count]) => `
    <div class="dist-row">
      <div class="dist-label">${escHtml(label)}</div>
      <div class="dist-bar-wrap"><div class="dist-bar" style="width:${(count/total*100).toFixed(1)}%;background:${distColor(label)}"></div></div>
      <div class="dist-count">${count}</div>
    </div>`).join('');
  return `<div class="dist-block"><h3>${title}</h3>${bars}</div>`;
}

function buildCard(row, idx) {
  const hasSentConf = row.sentiment_confidence ? ` <span class="conf">${(+row.sentiment_confidence*100).toFixed(0)}%</span>` : '';
  const hasIntConf  = row.intent_confidence    ? ` <span class="conf">${(+row.intent_confidence*100).toFixed(0)}%</span>`    : '';

  const replies = [];
  if (row.reply_option_1) replies.push({text: row.reply_option_1, rationale: row.reply_rationale_1, n: 1});
  if (row.reply_option_2) replies.push({text: row.reply_option_2, rationale: row.reply_rationale_2, n: 2});

  const replyHTML = row.suggested_reply
    ? `<div class="reply-section">
        <div class="reply-header">
          💬 Suggested Replies
          <span class="tone-tag">${escHtml(row.reply_tone || '')}</span>
        </div>
        ${replies.map(opt => `
          <div class="reply-option">
            <div class="opt-label">
              Option ${opt.n}
              <button class="copy-btn" onclick="copyReply(this, event)" data-text="${escHtml(opt.text)}">Copy</button>
            </div>
            <div class="opt-text">${escHtml(opt.text)}</div>
            ${opt.rationale ? `<div class="opt-rationale">${escHtml(opt.rationale)}</div>` : ''}
          </div>`).join('')}
      </div>`
    : `<div class="reply-section"><div class="no-reply">No reply generated (spam / troll / bot-like or skipped)</div></div>`;

  const twitterUrl = `https://twitter.com/i/web/status/${row.id}`;

  return `
    <div class="card" data-idx="${idx}" data-sentiment="${row.sentiment_label}" data-intent="${row.intent_label}" data-engagement="${row.engagement_label}" data-has-reply="${row.suggested_reply?'yes':'no'}" data-text="${escHtml((row.text+' '+row.author_username).toLowerCase())}">
      <div class="card-header" onclick="toggleCard(${idx})">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span class="author"><a href="${twitterUrl}" target="_blank" onclick="event.stopPropagation()">@${escHtml(row.author_username)}</a></span>
            <span class="ts">${fmt(row.timestamp)}</span>
            <span class="ts" style="color:#546e7a">Score: ${row.engagement_score}</span>
          </div>
          <div class="badges" style="margin-top:8px">
            <span class="badge ${badgeClass('sentiment', row.sentiment_label)}">${row.sentiment_label}${hasSentConf}</span>
            <span class="badge ${badgeClass('intent', row.intent_label)}">${row.intent_label}${hasIntConf}</span>
            <span class="badge ${badgeClass('engagement', row.engagement_label)}">${row.engagement_label}</span>
            ${row.suggested_reply ? '<span class="badge" style="background:#0d2a3c;color:#90caf9">💬 reply ready</span>' : ''}
          </div>
          <div class="card-text" style="margin-top:10px;padding:0">${escHtml(row.text)}</div>
        </div>
        <span class="chevron" id="chev-${idx}">▾</span>
      </div>
      <div class="card-body open" id="body-${idx}">
        ${replyHTML}
      </div>
    </div>`;
}

function toggleCard(idx) {
  const body = document.getElementById(`body-${idx}`);
  const chev = document.getElementById(`chev-${idx}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function copyReply(btn, event) {
  event.stopPropagation();
  const text = btn.getAttribute('data-text');
  const done = () => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); done(); } catch(e) {}
  document.body.removeChild(ta);
}

let allRows = [];
let repliesExpanded = true;

function applyFilters() {
  const sent  = document.getElementById('f-sentiment').value;
  const intent = document.getElementById('f-intent').value;
  const eng   = document.getElementById('f-engagement').value;
  const rep   = document.getElementById('f-replies').value;
  const q     = document.getElementById('f-search').value.toLowerCase().trim();

  let count = 0;
  document.querySelectorAll('.card').forEach(card => {
    const match =
      (!sent   || card.dataset.sentiment  === sent)  &&
      (!intent || card.dataset.intent     === intent) &&
      (!eng    || card.dataset.engagement === eng)    &&
      (!rep    || card.dataset.hasReply   === rep)    &&
      (!q      || card.dataset.text.includes(q));
    card.style.display = match ? '' : 'none';
    if (match) count++;
  });
  document.getElementById('filter-count').textContent = `Showing ${count} / ${allRows.length}`;
}

document.getElementById('toggle-replies-btn').addEventListener('click', () => {
  repliesExpanded = !repliesExpanded;
  document.getElementById('toggle-replies-btn').textContent = repliesExpanded ? 'Collapse all replies' : 'Expand all replies';
  document.querySelectorAll('.card-body').forEach(b => b.classList.toggle('open', repliesExpanded));
  document.querySelectorAll('.chevron').forEach(c => c.classList.toggle('open', !repliesExpanded));
});

['f-sentiment','f-intent','f-engagement','f-replies'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('f-search').addEventListener('input', applyFilters);
